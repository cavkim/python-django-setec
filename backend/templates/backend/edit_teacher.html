<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Edit Teacher</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="bg-white rounded-xl shadow-sm p-6 max-w-md">
        <h2 class="text-lg font-semibold mb-4">Edit Teacher</h2>
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="last_name" value="{{ teacher.last_name }}" class="w-full border rounded-lg px-3 py-2 mb-3" required>
            <input type="text" name="first_name" value="{{ teacher.first_name }}" class="w-full border rounded-lg px-3 py-2 mb-3" required>
            <select name="gender" class="w-full border rounded-lg px-3 py-2 mb-3" required>
                <option value="M" {% if teacher.gender == "M" %}selected{% endif %}>Male</option>
                <option value="F" {% if teacher.gender == "F" %}selected{% endif %}>Female</option>
            </select>
            <input type="date" name="dob" value="{{ teacher.dob }}" class="w-full border rounded-lg px-3 py-2 mb-3" required>
            <input type="text" name="address" value="{{ teacher.address }}" class="w-full border rounded-lg px-3 py-2 mb-3" required>
            <input type="number" step="0.01" name="salary" value="{{ teacher.salary }}" class="w-full border rounded-lg px-3 py-2 mb-4" required>
            <div class="flex space-x-2">
                <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Update</button>
                <a href="{% url 'dashboard' %}" class="px-4 py-2 rounded-lg border hover:bg-gray-50">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
