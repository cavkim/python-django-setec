<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Add Subject</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="bg-white rounded-xl shadow-sm p-6 max-w-md">
        <h2 class="text-lg font-semibold mb-4">Add Subject</h2>
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="subject_name" placeholder="Subject Name" class="w-full border rounded-lg px-3 py-2 mb-4" required>
            <div class="flex space-x-2">
                <button type="submit" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700">Save</button>
                <a href="{% url 'dashboard' %}" class="px-4 py-2 rounded-lg border hover:bg-gray-50">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
